<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="imagens/santaluziafavicon.png">
    <title>Conta</title>
</head>
<body>
    <!-- Depois mudar o action do form para onde esse login irá mandar os dados. -->
    <form action="" method="post" class="formulariologin">
        <label for="email-usuario">Email:</label>
        <input type="text" id="email-usuario" name="email-usuario" placeholder="Ex: siclano@hotmail.com">
        <br>
        
        <label for="senha-usuario">Senha:</label>
        <input type="password" id="senha-usuario" name="senha-usuario" maxlength="20" placeholder="">
        <br>
        
        <label for="cpf-usuario">CPF:</label>
        <input 
        type="text" 
        id="cpf-usuario"
        name="cpf-usuario" 
        placeholder="Ex: 000.000.000-00"
        inputmode="numeric"
        maxlength="14"
        >
        <br>
        <button type="submit">Enviar</button>
        <button type="button">Recuperar Senha</button>
    </form>
</body>
</html>
